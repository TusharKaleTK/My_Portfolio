<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
    padding: 20px; 
}

/* Video Background */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* Glass Card */
.card {
    width: 100%; 
    max-width: 400px; 
    padding: 40px;
    text-align: center;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* Profile */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 3px solid rgba(255,255,255,0.4);
}

/* Text */
h1 {
    font-size: 24px;
    font-weight: 600;
}

p {
    font-size: 14px;
    opacity: 0.8;
    margin-top: 5px;
    margin-bottom: 25px;
}

/* Social Buttons Grid */
.socials {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 12px; 
}

.social-wrapper {
    position: relative;
    display: block;
}

/* Reusable class to make a button span both columns */
.full-width {
    grid-column: 1 / -1; 
}

.social-btn {
    display: block;
    width: 100%; 
    padding: 10px 5px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-size: 12px; 
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.3s;
    white-space: nowrap; 
    text-overflow: ellipsis; 
    overflow: hidden;
    cursor: pointer;
}

.resume-btn {
    background: rgba(255, 255, 255, 0.25);
    font-weight: 600;
}

.social-btn:hover {
    background: white;
    color: black;
    transform: scale(1.05); 
}

/* Base Popup Styles (Desktop/Tablet Tooltip) */
.popup {
    visibility: hidden;
    opacity: 0;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.85);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    white-space: nowrap;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    z-index: 100;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none;
    text-align: center;
    line-height: 1.8; /* Give the text some breathing room */
}

/* JS active class for showing the popup */
.popup.active {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
}

@media (hover: hover) {
    .social-wrapper:hover .popup {
        visibility: visible;
        opacity: 1;
        pointer-events: auto;
    }
}

.popup.top { bottom: 130%; }

.popup a.email-link {
    color: #4da6ff;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
    display: block; /* Puts the email on its own line */
}

.popup a.email-link:hover {
    color: #80c1ff;
    text-decoration: underline;
}

.close-btn {
    display: none; 
}


/* ========================================= */
/* MEDIA QUERIES FOR MOBILE (< 480px)        */
/* ========================================= */

@media (max-width: 480px) {
    .card {
        padding: 30px 20px;
        position: relative; 
        overflow: hidden; 
    }

    .socials {
        grid-template-columns: 1fr; /* Stack all buttons */
    }

    .social-wrapper {
        position: static; 
    }

    .social-btn {
        padding: 12px 10px; 
        font-size: 13px; 
    }

    /* Convert Popup to cover the entire Glass Card on Mobile */
    .popup {
        position: absolute; 
        top: 0;
        left: 0;
        bottom: auto; 
        width: 100%;
        height: 100%;
        transform: none; 
        background: rgba(0, 0, 0, 0.95); 
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        white-space: normal; 
        font-size: 18px; 
        z-index: 999;
    }

    .popup-content {
        margin-bottom: 20px;
        text-align: center;
        word-break: break-all; 
        padding: 0 20px;
        line-height: 2;
    }

    .popup a.email-link {
        font-size: 16px; 
        margin-top: 5px;
    }

    /* Show Close Button on Mobile */
    .close-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 25px;
        background: rgba(255,255,255,0.1);
        color: white;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 30px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s;
    }

    .close-btn:hover {
        background: white;
        color: black;
    }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="video/background.mp4" type="video/mp4">
</video>

<div class="card">
    <img src="img/profile.jpg" class="profile-img">

    <h1>Tushar Kale</h1>
    <p>Motion Graphic • Designer • Creator</p>

    <div class="socials">
        
        <div class="social-wrapper full-width">
            <a href="#" class="social-btn popup-trigger">Contact Me</a>
            <div class="popup top">
                <div class="popup-content">
                    <strong>Email:</strong> 
                    <a href="mailto:tempmail@gmail.com" class="email-link">tusharkalemail@yahoo.in</a>
                </div>
                <div class="close-btn">Close</div>
            </div>
        </div>

        <div class="social-wrapper">
            <a href="https://www.linkedin.com/in/tushar-kale-759635169" target="_blank" rel="noopener noreferrer" class="social-btn">LinkedIn Profile</a>
        </div>

        <div class="social-wrapper">
            <a href="https://www.behance.net/tusharkaleTK/projects" target="_blank" rel="noopener noreferrer" class="social-btn">Behance_Portfolio</a>
        </div>

        <div class="social-wrapper full-width">
            <a href="https://drive.google.com/uc?export=download&id=1sE3xrhiO1wweiZ3p_pYQx_3DFQcoACyB" download class="social-btn resume-btn">Download Resume</a>
        </div>

    </div>
</div>

<script>
    const popupTriggers = document.querySelectorAll('.popup-trigger');
    const closeButtons = document.querySelectorAll('.close-btn');

    // Open popup on button click 
    popupTriggers.forEach(trigger => {
        trigger.addEventListener('click', function(e) {
            e.preventDefault(); 
            e.stopPropagation(); 
            
            document.querySelectorAll('.popup').forEach(p => p.classList.remove('active'));
            
            const popup = this.nextElementSibling;
            if(popup && popup.classList.contains('popup')) {
                popup.classList.add('active');
            }
        });
    });

    // Close popup on "Close" button click
    closeButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation(); 
            this.closest('.popup').classList.remove('active');
        });
    });

    // Close popups if the user clicks anywhere outside of them
    window.addEventListener('click', function(e) {
        if (!e.target.closest('.popup') && !e.target.closest('.popup-trigger')) {
            document.querySelectorAll('.popup').forEach(p => p.classList.remove('active'));
        }
    });
</script>

</body>
</html>
