<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

/* Video Background */

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* Glass Card */

.card{
width:340px;
padding:40px;
text-align:center;

background: rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
border-radius:20px;

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 10px 40px rgba(0,0,0,0.3);

transition:0.4s;
}

.card:hover{
transform: translateY(-10px);
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* Profile */

.profile-img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:15px;
border:3px solid rgba(255,255,255,0.4);
}

/* Text */

h1{
font-size:24px;
font-weight:600;
}

p{
font-size:14px;
opacity:0.8;
margin-top:5px;
margin-bottom:20px;
}

/* Social Buttons */

.socials a{
display:inline-block;
margin:8px;
padding:10px 16px;
border-radius:30px;
text-decoration:none;
color:white;
font-size:14px;

background: rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.2);

transition:0.3s;
}

.socials a:hover{
background:white;
color:black;
transform:scale(1.1);
}

</style>
</head>

<body>

<!-- Background Video -->

<video autoplay muted loop id="bg-video">
<source src="video/background.mp4" type="video/mp4">
</video>

<!-- Portfolio Card -->

<div class="card">

<img src="img/profile.jpg" class="profile-img">

<h1>Tushar Kale</h1>
<p>Motion Graphic • Designer • Creator</p>

<div class="socials">

<a href="#">Contact</a>
<a href="#">LinkedIn</a>
<a href="#">Email</a>

</div>

</div>

</body>
</html>
